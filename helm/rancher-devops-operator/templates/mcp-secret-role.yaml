{{- if .Values.mcp.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "rancher-devops-operator.fullname" . }}-mcp-token
  namespace: {{ .Values.mcp.tokenNamespace }}
  labels:
    {{- include "rancher-devops-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
      - create
      - patch
      - update
      - delete
{{- end }}
