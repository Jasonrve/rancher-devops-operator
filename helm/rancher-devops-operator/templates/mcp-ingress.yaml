{{- if and .Values.mcp.enabled .Values.mcp.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "rancher-devops-operator.fullname" . }}-mcp
  labels:
    {{- include "rancher-devops-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
  {{- with .Values.mcp.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.mcp.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
    - host: {{ default (printf "%s.oly.workside.win" (include "rancher-devops-operator.fullname" .)) .Values.mcp.ingress.host | quote }}
      http:
        paths:
          - path: {{ .Values.mcp.ingress.path }}
            pathType: {{ .Values.mcp.ingress.pathType }}
            backend:
              service:
                name: {{ include "rancher-devops-operator.fullname" . }}-mcp
                port:
                  number: {{ .Values.mcp.port }}
  {{- with .Values.mcp.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}