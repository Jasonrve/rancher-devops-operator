{{- if .Values.mcp.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rancher-devops-operator.fullname" . }}-mcp
  labels:
    {{- include "rancher-devops-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.mcp.port }}
      targetPort: mcp
      protocol: TCP
      name: mcp
  selector:
    {{- include "rancher-devops-operator.selectorLabels" . | nindent 4 }}
{{- end }}
