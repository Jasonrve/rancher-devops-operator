{{- if .Values.mcp.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "rancher-devops-operator.fullname" . }}-mcp-token
  namespace: {{ .Values.mcp.tokenNamespace }}
  labels:
    {{- include "rancher-devops-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "rancher-devops-operator.fullname" . }}-mcp-token
subjects:
  - kind: ServiceAccount
    name: {{ include "rancher-devops-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
